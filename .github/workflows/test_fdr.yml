name: FDR 진단
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install finance-datareader pandas
      - name: Test FDR
        run: |
          python -c "
import FinanceDataReader as fdr

tests = [('KS11','20250101','20250320'), ('KOSPI/PBR','20250101','20250320')]
for sym, s, e in tests:
    try:
        df = fdr.DataReader(sym, s, e)
        print(f'OK {sym}: rows={len(df)}, cols={list(df.columns)}')
        if not df.empty:
            print(f'   last: {df.index[-1]}')
    except Exception as ex:
        print(f'FAIL {sym}: {ex}')
"
